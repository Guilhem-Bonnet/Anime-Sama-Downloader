run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - whitespace

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/Guilhem-Bonnet/Anime-Sama-Downloader
  errcheck:
    exclude-functions:
      - (net/http.ResponseWriter).Write
      - (*encoding/json.Encoder).Encode
      - fmt.Fprintf
      - fmt.Fprintln
      - fmt.Fprint
      - (io.Closer).Close
      - (*os.File).Close
      - (*os.File).Write

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Test files: allow unchecked errors (common test pattern)
    - path: _test\.go
      linters:
        - errcheck
    # defer body.Close() is idiomatic Go
    - linters:
        - errcheck
      source: "defer .+\\.Close\\(\\)"
    # French words in comments — not misspellings
    - linters:
        - misspell
      text: "ressemble"
    - linters:
        - misspell
      text: "respecte"
    - linters:
        - misspell
      text: "pointeur"
