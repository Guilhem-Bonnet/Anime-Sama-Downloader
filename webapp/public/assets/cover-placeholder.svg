<svg width="640" height="900" viewBox="0 0 640 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1820"/>
      <stop offset="100%" stop-color="#141116"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8f6a3d"/>
      <stop offset="100%" stop-color="#5a5249"/>
    </linearGradient>
    <pattern id="grain" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#ffffff" opacity="0.06"/>
      <circle cx="5" cy="3" r="0.5" fill="#ffffff" opacity="0.05"/>
      <circle cx="3" cy="6" r="0.5" fill="#ffffff" opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="640" height="900" rx="28" fill="url(#paper)"/>
  <rect x="16" y="16" width="608" height="868" rx="22" stroke="#6e4f2e" stroke-width="2" opacity="0.6"/>
  <rect x="30" y="30" width="580" height="840" rx="18" stroke="#a8926b" stroke-width="1" opacity="0.35"/>

  <rect x="40" y="40" width="560" height="820" rx="16" fill="url(#grain)" opacity="0.35"/>

  <!-- Landscape silhouette -->
  <path d="M0 700L140 540L280 680L360 590L500 720H0Z" fill="#0f172a" opacity="0.9"/>
  <path d="M240 740L320 640L420 740H240Z" fill="#1f2937" opacity="0.85"/>
  <path d="M420 760L520 650L620 760H420Z" fill="#0b1220" opacity="0.9"/>

  <!-- Ink strokes -->
  <path d="M60 180C180 140 280 150 380 180" stroke="url(#ink)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <path d="M420 200C500 170 560 175 600 190" stroke="#6b7280" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

  <!-- Title placeholder -->
  <rect x="120" y="280" width="400" height="14" rx="7" fill="#2b3648"/>
  <rect x="160" y="310" width="320" height="10" rx="5" fill="#334155"/>

  <!-- Badge -->
  <rect x="470" y="60" width="130" height="34" rx="17" fill="#2a2530" stroke="#8f6a3d" stroke-width="1" opacity="0.9"/>
  <circle cx="494" cy="77" r="6" fill="#8f6a3d"/>
  <rect x="506" y="72" width="72" height="10" rx="5" fill="#c9bca6" opacity="0.6"/>
</svg>
